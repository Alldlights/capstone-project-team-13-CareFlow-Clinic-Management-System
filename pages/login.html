<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Care Flow — Login</title>
	<link rel="stylesheet" href="../css/login.css">
	<link rel="icon" href="../assets/logo/care.png" type="image/png">
</head>
<body>
	<div class="login-page">
		<aside class="left">
			<div class="brand">
				<img src="../assets/logo/care.png" alt="Care Flow logo">
			</div>
			<h2 class="title">Login</h2>
			<div class="form-message" aria-live="polite"></div>

			<form class="login-form" action="#" method="post">
				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="Email">

				<label for="password">Password</label>
				<input id="password" name="password" type="password" placeholder="Password">

				<div class="form-row options">
					<label class="remember"><input type="checkbox" name="remember"> Remember</label>
				</div>

				<button class="btn-login" type="submit">Login</button>

				<a class="forgot" href="change-password.html">Forgot password?</a>
			</form>
		</aside>

		<script src="../js/auth.js"></script>

		<main class="right">
			<div class="circle"></div>
			<div class="hero">
				<h1>WELCOME BACK!</h1>
				<p>Securely access your account and stay connected to your healthcare operations.</p>
			</div>
		</main>
	</div>
</body>
</html>

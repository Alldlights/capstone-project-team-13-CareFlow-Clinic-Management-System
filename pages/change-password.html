<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Care Flow — Change Password</title>
  <link rel="stylesheet" href="../css/login.css">
  <link rel="icon" href="../assets/logo/care.png" type="image/png">
</head>
<body>
  <div class="login-page">
    <aside class="left">
      <div class="brand">
        <img src="../assets/logo/care.png" alt="Care Flow logo">
      </div>
      <h2 class="title">Change Password</h2>
      <div class="form-message" aria-live="polite"></div>

      <form class="login-form" action="#" method="post">
        <label for="current">Current Password</label>
        <input id="current" name="current" type="password" placeholder="Current password">

        <label for="new">New Password</label>
        <input id="new" name="new" type="password" placeholder="New password">

        <label for="confirm">Confirm New Password</label>
        <input id="confirm" name="confirm" type="password" placeholder="Confirm new password">

        <button class="btn-login" type="submit">Change Password</button>

        <a class="forgot" href="login.html">Back to login</a>
      </form>
    </aside>

    <script src="../js/auth.js"></script>

    <main class="right">
      <div class="circle"></div>
      <div class="hero">
        <h1>Secure Your Account</h1>
        <p>Choose a strong password and keep your account safe. We'll never share your credentials.</p>
      </div>
    </main>
  </div>
</body>
</html>
